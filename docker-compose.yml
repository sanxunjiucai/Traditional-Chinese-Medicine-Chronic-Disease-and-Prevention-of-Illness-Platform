version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tcm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tcm
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d tcm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
