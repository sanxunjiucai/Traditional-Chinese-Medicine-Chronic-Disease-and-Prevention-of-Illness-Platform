<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>治未病·诊中助手</title>
  <style>
    /* ─── Base reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #F5F2EC;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #2D2A24;
    }

    /* ─── Loading indicator (shown before sidebar injects) ────────────── */
    #tcm-loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 12px; color: #7A7268; font-size: 13px;
      /* hidden via JS once sidebar is ready */
    }
    #tcm-loading .spin {
      width: 24px; height: 24px;
      border: 2.5px solid #E8E2D8;
      border-top-color: #4E7A61;
      border-radius: 50%;
      animation: _spin 0.7s linear infinite;
    }
    @keyframes _spin { to { transform: rotate(360deg); } }

    /* ─── Electron-specific sidebar overrides ─────────────────────────── */
    /*
     * content.js appends #tcm-assistant-sidebar to document.body as a
     * fixed-position overlay covering the right side of a browser window.
     * In Electron the sidebar IS the window, so we expand it to fill
     * the entire viewport.
     */
    #tcm-assistant-sidebar {
      position: fixed !important;
      inset: 0 !important;          /* top/right/bottom/left = 0 */
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      min-width: unset !important;
      transform: translateX(0) !important;
      border-radius: 0 !important;
      border-left: none !important;
      box-shadow: none !important;
      z-index: 1 !important;
    }

    /* Always show expanded — no collapse transition in a dedicated window */
    #tcm-assistant-sidebar.tcm-collapsed {
      transform: none !important;
      width: 100% !important;
    }

    /* Hide the collapse-to-tab handle (not meaningful as a window) */
    .tcm-resize-handle,
    .tcm-collapsed-tab {
      display: none !important;
    }

    /* Make the sidebar header act as the drag region for the frameless window */
    .tcm-header {
      -webkit-app-region: drag !important;
      /* Slightly taller on desktop for easier dragging */
      min-height: 44px !important;
    }

    /* Interactive elements inside the header must NOT be drag targets */
    .tcm-header button,
    .tcm-header input,
    .tcm-header a,
    .tcm-header-right,
    .tcm-header-patient-name {
      -webkit-app-region: no-drag !important;
    }

    /* Scrollbar styling to match the sidebar theme */
    ::-webkit-scrollbar            { width: 5px; }
    ::-webkit-scrollbar-track      { background: transparent; }
    ::-webkit-scrollbar-thumb      { background: #D8D2C8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover{ background: #B8B0A4; }
  </style>
</head>
<body>

<!-- Shown until content.js injects the sidebar -->
<div id="tcm-loading">
  <div class="spin"></div>
  <span>正在启动诊中助手…</span>
</div>

<!--
  chrome-shim.js MUST load synchronously here so that window.chrome is
  available when background.js and content.js are injected by main.js
  (via webContents.executeJavaScript) after the did-finish-load event.
-->
<script src="chrome-shim.js"></script>

</body>
</html>
