{% extends "_layouts/patient.html" %}
{% block title %}调护建议{% endblock %}
{% block page_title %}调护建议{% endblock %}

{% block content %}
<div style="padding: 16px; display: flex; flex-direction: column; gap: 14px; padding-bottom: 24px;">

  <!-- 无方案引导 -->
  <div id="no-plan" style="display:none;text-align:center;padding:40px 20px;">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:#EBF2ED;border-radius:20px;margin-bottom:16px;">
      <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 32 L18 14" stroke="#4E7A61" stroke-width="2" stroke-linecap="round"/>
        <path d="M18 20 C18 20 10 18 9 10 C15 9 20 14 18 20Z" fill="#C8DDD0" stroke="#4E7A61" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M18 26 C18 26 26 24 27 16 C21 15 16 20 18 26Z" fill="#D4E5D9" stroke="#4E7A61" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <p style="font-size:16px;font-weight:500;color:#28231E;margin:0 0 8px;">还未生成调护方案</p>
    <p style="font-size:14px;color:#9A9188;margin:0 0 24px;line-height:1.6;">完成体质评估后自动生成个性化方案</p>
    <a href="/h5/constitution/assess" style="
      display:inline-block;background:#4E7A61;color:#fff;
      font-size:14px;font-weight:500;padding:13px 28px;
      border-radius:14px;text-decoration:none;cursor:pointer;
    ">开始体质评估</a>
  </div>

  <!-- 方案内容 -->
  <div id="plan-content" style="display:none;flex-direction:column;gap:10px;"></div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
const CAT_NAMES = {
  DAILY_ROUTINE: '起居作息',
  DIET:          '饮食调护',
  EXERCISE:      '运动导引',
  EMOTIONAL:     '情志调护',
  EXTERNAL:      '外治非药',
};

const CAT_ICONS = {
  DAILY_ROUTINE: `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
  DIET:          `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>`,
  EXERCISE:      `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`,
  EMOTIONAL:     `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>`,
  EXTERNAL:      `<svg width="20" height="20" viewBox="0 0 36 36" fill="none"><path d="M18 32 L18 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18 20 C18 20 10 18 9 10 C15 9 20 14 18 20Z" fill="rgba(78,122,97,0.15)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M18 26 C18 26 26 24 27 16 C21 15 16 20 18 26Z" fill="rgba(78,122,97,0.10)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>`,
};

const CAT_COLORS = {
  DAILY_ROUTINE: { bg: '#EEE8F5', color: '#7A5EA0' },
  DIET:          { bg: '#F0F8EE', color: '#4E7A61' },
  EXERCISE:      { bg: '#F7EEE4', color: '#B8885E' },
  EMOTIONAL:     { bg: '#EEF2F7', color: '#5070A8' },
  EXTERNAL:      { bg: '#EBF2ED', color: '#4E7A61' },
};

async function load() {
  const resp = await fetch('/tools/constitution/latest');
  const data = await resp.json();
  if (!data.success || !data.data) {
    document.getElementById('no-plan').style.display = 'block';
    return;
  }

  const container = document.getElementById('plan-content');
  container.style.display = 'flex';

  const categories = ['DAILY_ROUTINE', 'DIET', 'EXERCISE', 'EMOTIONAL', 'EXTERNAL'];
  categories.forEach(cat => {
    const c = CAT_COLORS[cat] || { bg: '#EBF2ED', color: '#4E7A61' };
    const div = document.createElement('div');
    div.style.cssText = 'background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 1px 14px rgba(68,60,48,0.07);';
    div.innerHTML = `
      <button
        onclick="toggleSection(this)"
        style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:transparent;border:none;cursor:pointer;font-family:inherit;text-align:left;"
        aria-expanded="false"
      >
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;background:${c.bg};border-radius:12px;display:flex;align-items:center;justify-content:center;color:${c.color};flex-shrink:0;">
            ${CAT_ICONS[cat] || ''}
          </div>
          <span style="font-size:15px;font-weight:600;color:#28231E;">${CAT_NAMES[cat]}</span>
        </div>
        <svg class="chevron" width="16" height="16" fill="none" stroke="#9A9188" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform 0.25s;flex-shrink:0;">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>
      <div class="section-content" style="display:none;padding:0 18px 18px;color:#6A6258;font-size:14px;line-height:1.7;" data-cat="${cat}">
        <p style="margin:0;color:#9A9188;text-align:center;padding:8px 0;">加载中…</p>
      </div>
    `;
    container.appendChild(div);
  });

  loadRecommendations();
}

async function loadRecommendations() {
  const resp = await fetch('/tools/constitution/latest');
  const data = await resp.json();
  if (!data.success || !data.data) return;

  const assessment = data.data;
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.innerHTML = `
      <div style="padding-top:4px;">
        <p style="font-size:12px;color:#9A9188;margin:0 0 8px;padding:6px 10px;background:#F5F2EC;border-radius:8px;display:inline-block;">基于体质：${assessment.main_type}</p>
        <p style="margin:0;color:#6A6258;font-size:14px;line-height:1.7;">根据您的体质特征，我们已为您匹配个性化调护建议。如需详细方案，请联系您的随访医生。</p>
      </div>
    `;
  });
}

function toggleSection(btn) {
  const content = btn.nextElementSibling;
  const chevron = btn.querySelector('.chevron');
  const isOpen = content.style.display !== 'none';
  content.style.display = isOpen ? 'none' : 'block';
  chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
  btn.setAttribute('aria-expanded', String(!isOpen));
}

load();
</script>
{% endblock %}
