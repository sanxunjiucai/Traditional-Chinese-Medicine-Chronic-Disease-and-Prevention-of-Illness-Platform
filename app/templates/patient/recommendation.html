{% extends "_layouts/patient.html" %}
{% block title %}调护建议{% endblock %}
{% block page_title %}调护建议{% endblock %}

{% block content %}
<div class="px-4 pt-4 space-y-4 pb-6">

  <div id="no-plan" class="hidden text-center py-12">
    <div class="text-5xl mb-3">🌿</div>
    <p class="text-gray-500 text-sm">还未生成调护方案</p>
    <p class="text-gray-400 text-xs mt-1">完成体质评估后自动生成</p>
    <a href="/h5/constitution/assess" class="inline-block mt-4 bg-green-600 text-white px-6 py-2.5 rounded-xl text-sm">开始体质评估</a>
  </div>

  <div id="plan-content" class="space-y-3 hidden"></div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
const CAT_NAMES = {
  DAILY_ROUTINE: '起居作息', DIET: '饮食调护', EXERCISE: '运动导引',
  EMOTIONAL: '情志调护', EXTERNAL: '外治非药',
};
const CAT_ICONS = {
  DAILY_ROUTINE: '🌙', DIET: '🥗', EXERCISE: '🧘', EMOTIONAL: '💆', EXTERNAL: '🌿',
};

async function load() {
  const resp = await fetch('/tools/constitution/latest');
  const data = await resp.json();
  if (!data.success || !data.data) {
    document.getElementById('no-plan').classList.remove('hidden');
    return;
  }

  // 调护建议是存在 recommendation plan 里，通过 constitution submit 时自动生成
  // 这里简化：直接读取体质结果展示提示（或调用 recommendation API）
  const assessment = data.data;

  // 实际调用：GET /tools/followup/... 暂无单独 recommendation get endpoint
  // 这里展示体质对应的一般性提示
  document.getElementById('plan-content').classList.remove('hidden');
  const container = document.getElementById('plan-content');

  const mainType = assessment.main_type;
  const TYPE_TIPS = {
    BALANCED: {
      DAILY_ROUTINE: ['保持早睡早起的规律作息，每天7-8小时睡眠'],
      DIET: ['饮食多样化，五谷杂粮均衡摄入，避免暴饮暴食'],
      EXERCISE: ['每天保持30分钟以上的有氧运动，如快走、太极拳'],
      EMOTIONAL: ['保持积极乐观心态，定期放松减压'],
      EXTERNAL: ['可适当进行穴位按摩，如足三里保健'],
    },
  };

  // 通用提示文本（实际从 DB 模板获取）
  const categories = ['DAILY_ROUTINE', 'DIET', 'EXERCISE', 'EMOTIONAL', 'EXTERNAL'];
  categories.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'bg-white rounded-2xl overflow-hidden';
    div.innerHTML = `
      <button class="w-full flex items-center justify-between p-4" onclick="toggleSection(this)">
        <div class="flex items-center space-x-3">
          <span class="text-2xl">${CAT_ICONS[cat]}</span>
          <span class="font-semibold text-gray-800">${CAT_NAMES[cat]}</span>
        </div>
        <svg class="w-4 h-4 text-gray-400 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div class="section-content px-4 pb-4 space-y-2 hidden" data-cat="${cat}">
        <p class="text-sm text-gray-500 text-center py-2">正在加载建议...</p>
      </div>
    `;
    container.appendChild(div);
  });

  // 加载真实建议
  loadRecommendations();
}

async function loadRecommendations() {
  // 重新读取体质评估
  const resp = await fetch('/tools/constitution/latest');
  const data = await resp.json();
  if (!data.success || !data.data) return;

  // 展示体质分数信息
  const assessment = data.data;
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.innerHTML = `
      <div class="text-sm text-gray-600 leading-relaxed">
        <p class="text-xs text-gray-400 mb-1">基于体质：${assessment.main_type}</p>
        <p>根据您的体质特征，我们已为您匹配个性化调护建议。如需详细方案，请联系您的随访医生。</p>
      </div>
    `;
  });
}

function toggleSection(btn) {
  const content = btn.nextElementSibling;
  const icon = btn.querySelector('svg');
  content.classList.toggle('hidden');
  icon.classList.toggle('rotate-180');
}

load();
</script>
{% endblock %}
