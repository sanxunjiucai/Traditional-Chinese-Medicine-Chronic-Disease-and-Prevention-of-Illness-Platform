{% extends "_layouts/patient.html" %}
{% block title %}健康档案{% endblock %}
{% block page_title %}健康档案{% endblock %}

{% block content %}
<div class="px-4 pt-4 space-y-4 pb-6">

  <!-- 基础信息卡片 -->
  <div class="bg-white rounded-2xl p-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-semibold text-gray-800">基础信息</h3>
      <a href="#" onclick="toggleEdit()" class="text-green-600 text-sm">编辑</a>
    </div>
    <div id="profile-display" class="space-y-2">
      <div class="animate-pulse space-y-2">
        <div class="h-8 bg-gray-100 rounded"></div>
        <div class="h-8 bg-gray-100 rounded"></div>
      </div>
    </div>
    <div id="profile-form" class="space-y-3 hidden">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500">身高 (cm)</label>
          <input id="height" type="number" class="w-full border border-gray-200 rounded-xl px-3 py-2 mt-1 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
        <div>
          <label class="text-xs text-gray-500">体重 (kg)</label>
          <input id="weight" type="number" step="0.1" class="w-full border border-gray-200 rounded-xl px-3 py-2 mt-1 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
      </div>
      <div>
        <label class="text-xs text-gray-500">性别</label>
        <select id="gender" class="w-full border border-gray-200 rounded-xl px-3 py-2 mt-1 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">请选择</option>
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
      <div class="flex space-x-2">
        <button onclick="saveProfile()" class="flex-1 bg-green-600 text-white text-sm py-2.5 rounded-xl">保存</button>
        <button onclick="toggleEdit()" class="flex-1 border border-gray-200 text-gray-600 text-sm py-2.5 rounded-xl">取消</button>
      </div>
    </div>
  </div>

  <!-- 慢病档案 -->
  <div class="bg-white rounded-2xl p-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-semibold text-gray-800">慢病档案</h3>
      <button onclick="showAddDisease()" class="text-green-600 text-sm">+ 添加</button>
    </div>
    <div id="disease-list" class="space-y-2"></div>
  </div>

  <!-- 添加慢病 Modal -->
  <div id="disease-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end">
    <div class="bg-white rounded-t-2xl w-full p-5 space-y-4">
      <h3 class="font-semibold text-gray-800">添加慢病档案</h3>
      <div>
        <label class="text-xs text-gray-500">病种</label>
        <select id="disease-type" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 mt-1 text-sm">
          <option value="HYPERTENSION">高血压</option>
          <option value="DIABETES_T2">2型糖尿病</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500">确诊时间（可选）</label>
        <input id="disease-date" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 mt-1 text-sm">
      </div>
      <div class="flex space-x-3">
        <button onclick="closeDiseaseModal()" class="flex-1 border border-gray-200 text-gray-600 py-3 rounded-xl text-sm">取消</button>
        <button onclick="addDisease()" class="flex-1 bg-green-600 text-white py-3 rounded-xl text-sm">添加</button>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
const DISEASE_NAMES = {HYPERTENSION: '高血压', DIABETES_T2: '2型糖尿病'};

async function loadProfile() {
  // Profile display (simplified)
  document.getElementById('profile-display').innerHTML = `
    <div class="text-sm text-gray-400 text-center py-2">点击右上角"编辑"更新基础信息</div>
  `;
}

async function loadDiseases() {
  const resp = await fetch('/tools/disease');
  const data = await resp.json();
  const list = document.getElementById('disease-list');
  if (!data.success || data.data.length === 0) {
    list.innerHTML = '<p class="text-sm text-gray-400 text-center py-2">暂无慢病档案，点击添加</p>';
    return;
  }
  list.innerHTML = data.data.map(d => `
    <div class="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2.5">
      <div>
        <p class="font-medium text-sm text-gray-800">${DISEASE_NAMES[d.disease_type] || d.disease_type}</p>
        ${d.diagnosed_at ? `<p class="text-xs text-gray-400">确诊：${d.diagnosed_at}</p>` : ''}
      </div>
      <span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">管理中</span>
    </div>
  `).join('');
}

function toggleEdit() {
  document.getElementById('profile-display').classList.toggle('hidden');
  document.getElementById('profile-form').classList.toggle('hidden');
}

async function saveProfile() {
  const body = {};
  const h = document.getElementById('height').value;
  const w = document.getElementById('weight').value;
  const g = document.getElementById('gender').value;
  if (h) body.height_cm = parseFloat(h);
  if (w) body.weight_kg = parseFloat(w);
  if (g) body.gender = g;

  const resp = await fetch('/tools/profile', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
  });
  const data = await resp.json();
  if (data.success) toggleEdit();
  else alert('保存失败：' + data.error.message);
}

function showAddDisease() { document.getElementById('disease-modal').classList.remove('hidden'); }
function closeDiseaseModal() { document.getElementById('disease-modal').classList.add('hidden'); }

async function addDisease() {
  const body = {
    disease_type: document.getElementById('disease-type').value,
    diagnosed_at: document.getElementById('disease-date').value || null,
  };
  const resp = await fetch('/tools/disease', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
  });
  const data = await resp.json();
  if (data.success) { closeDiseaseModal(); loadDiseases(); }
  else alert('添加失败：' + data.error.message);
}

loadProfile();
loadDiseases();
</script>
{% endblock %}
