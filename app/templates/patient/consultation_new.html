{% extends "_layouts/patient.html" %}

{% block title %}发起咨询 - 治未病平台{% endblock %}
{% block page_title %}在线咨询{% endblock %}
{% set active_tab = "home" %}

{% block content %}
<div class="px-4 pt-4 pb-8">

  <!-- 提示横幅 -->
  <div style="background:#EBF2ED;border:1px solid #C8DDD0;border-radius:16px;padding:14px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start;">
    <div style="width:36px;height:36px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="18" height="18" fill="none" stroke="#4E7A61" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div>
      <p style="font-size:14px;font-weight:500;color:#3D5C49;margin:0 0 3px;">在线咨询医生</p>
      <p style="font-size:12px;color:#6A8C78;margin:0;line-height:1.6;">医生通常在工作时间内回复，急症请直接就诊或拨打 120</p>
    </div>
  </div>

  <!-- 表单 -->
  <form onsubmit="submitConsult(event)" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">咨询标题 <span class="text-red-500">*</span></label>
      <input id="title" type="text" maxlength="200" required
        placeholder="简短描述您的问题，如"血压偏高怎么调理""
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">问题描述 <span class="text-red-500">*</span></label>
      <textarea id="content" rows="5" required
        placeholder="请详细描述您的症状、用药情况或疑问，越详细越好..."
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent resize-none"></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">紧急程度</label>
      <div class="flex gap-3">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="priority" value="NORMAL" checked class="text-green-600">
          <span class="text-sm text-gray-700">普通</span>
          <span class="text-xs text-gray-400">（一般问题）</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="priority" value="URGENT" class="text-red-500">
          <span class="text-sm text-red-600 font-medium">紧急</span>
          <span class="text-xs text-gray-400">（需要尽快回复）</span>
        </label>
      </div>
    </div>

    <div id="error-msg" class="hidden bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-600"></div>

    <button type="submit" id="submit-btn"
      class="w-full py-3.5 bg-green-600 text-white rounded-xl font-medium text-sm hover:bg-green-700 active:scale-95 transition-transform mt-2">
      提交咨询
    </button>

    <a href="/h5/home" class="block text-center text-sm text-gray-400 hover:text-gray-600 mt-2">取消，返回首页</a>

  </form>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function submitConsult(e) {
  e.preventDefault();
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();
  const priority = document.querySelector('input[name="priority"]:checked').value;

  if (!title || !content) {
    showError('请填写标题和描述');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    const r = await fetch('/tools/consultations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content, priority }),
    });
    const j = await r.json();
    if (j.success) {
      window.location.href = `/h5/consultation/${j.data.id}`;
    } else {
      showError(j.error?.message || '提交失败，请稍后重试');
      btn.disabled = false;
      btn.textContent = '提交咨询';
    }
  } catch(err) {
    showError('网络错误，请检查连接后重试');
    btn.disabled = false;
    btn.textContent = '提交咨询';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}
</script>
{% endblock %}
