{% extends "_layouts/patient.html" %}
{% block title %}体质结果{% endblock %}
{% block page_title %}体质评估报告{% endblock %}

{% block header_left %}
<a href="/h5/constitution" class="w-8 h-8 flex items-center justify-center text-gray-500">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
  </svg>
</a>
{% endblock %}

{% block content %}
<div class="px-4 pt-4 space-y-4">

  <!-- 主体质卡片 -->
  <div id="main-card" class="bg-gradient-to-br from-green-600 to-emerald-500 rounded-2xl p-6 text-white text-center">
    <p class="text-green-100 text-sm">您的主导体质</p>
    <h2 class="text-3xl font-bold mt-2" id="main-type-name">-</h2>
    <div class="mt-3 inline-flex items-center bg-white/20 rounded-full px-4 py-1.5">
      <span class="text-sm" id="main-score">-</span>
    </div>
  </div>

  <!-- 体质说明 -->
  <div class="bg-white rounded-2xl p-4">
    <h3 class="font-semibold text-gray-800 mb-2">体质特征说明</h3>
    <p id="main-desc" class="text-sm text-gray-600 leading-relaxed">-</p>
  </div>

  <!-- 兼夹体质 -->
  <div id="secondary-section" class="bg-white rounded-2xl p-4 hidden">
    <h3 class="font-semibold text-gray-800 mb-2">兼夹体质</h3>
    <div id="secondary-tags" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- 各体质得分 -->
  <div class="bg-white rounded-2xl p-4">
    <h3 class="font-semibold text-gray-800 mb-3">各体质评分</h3>
    <div id="scores-list" class="space-y-2"></div>
  </div>

  <!-- 操作按钮 -->
  <div class="flex space-x-3 pb-4">
    <a href="/h5/recommendation" class="flex-1 bg-green-600 text-white text-center font-medium py-3 rounded-xl text-sm">
      查看调护建议
    </a>
    <a href="/h5/constitution/assess" class="flex-1 border border-green-600 text-green-600 text-center font-medium py-3 rounded-xl text-sm">
      重新评估
    </a>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
const ASSESSMENT_ID = "{{ assessment_id }}";

const TYPE_NAMES = {
  BALANCED: '平和质', QI_DEFICIENCY: '气虚质', YANG_DEFICIENCY: '阳虚质',
  YIN_DEFICIENCY: '阴虚质', PHLEGM_DAMPNESS: '痰湿质', DAMP_HEAT: '湿热质',
  BLOOD_STASIS: '血瘀质', QI_STAGNATION: '气郁质', SPECIAL_DIATHESIS: '特禀质',
};

const LEVEL_LABELS = {yes: '明显偏颇', tendency: '有倾向', no: '正常'};
const LEVEL_COLORS = {yes: 'text-red-500', tendency: 'text-orange-400', no: 'text-green-500'};

async function load() {
  const resp = await fetch('/tools/constitution/latest');
  const data = await resp.json();
  if (!data.success || !data.data) {
    window.location.href = '/h5/constitution';
    return;
  }
  const a = data.data;

  document.getElementById('main-type-name').textContent = TYPE_NAMES[a.main_type] || a.main_type;
  const mainScore = a.result?.[a.main_type];
  document.getElementById('main-score').textContent = mainScore ? `转换分：${mainScore.converted_score} 分` : '-';

  // 兼夹体质
  if (a.secondary_types && a.secondary_types.length > 0) {
    document.getElementById('secondary-section').classList.remove('hidden');
    a.secondary_types.forEach(bt => {
      const span = document.createElement('span');
      span.className = 'bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-xs font-medium';
      span.textContent = TYPE_NAMES[bt] || bt;
      document.getElementById('secondary-tags').appendChild(span);
    });
  }

  // 各体质得分条
  const scoresList = document.getElementById('scores-list');
  if (a.result) {
    Object.entries(a.result).sort((x, y) => y[1].converted_score - x[1].converted_score).forEach(([bt, s]) => {
      const div = document.createElement('div');
      const isMain = bt === a.main_type;
      div.className = 'space-y-0.5';
      div.innerHTML = `
        <div class="flex justify-between text-xs">
          <span class="font-medium ${isMain ? 'text-green-700' : 'text-gray-600'}">${TYPE_NAMES[bt] || bt}${isMain ? ' ✓' : ''}</span>
          <span class="${LEVEL_COLORS[s.level] || 'text-gray-400'}">${LEVEL_LABELS[s.level] || s.level}（${s.converted_score}分）</span>
        </div>
        <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-full rounded-full ${isMain ? 'bg-green-500' : s.level === 'yes' ? 'bg-orange-400' : 'bg-gray-300'}"
               style="width: ${Math.max(0, Math.min(100, s.converted_score))}%"></div>
        </div>
      `;
      scoresList.appendChild(div);
    });
  }
}

load();
</script>
{% endblock %}
