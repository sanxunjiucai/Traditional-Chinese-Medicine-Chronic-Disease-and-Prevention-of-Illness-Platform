<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 治未病平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-sm">
  <div class="text-center mb-6">
    <a href="/login" class="inline-flex items-center text-green-600 text-sm mb-4">
      <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      返回登录
    </a>
    <h1 class="text-xl font-bold text-gray-800">创建账号</h1>
  </div>

  <div class="bg-white rounded-2xl shadow-md p-6">
    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">姓名</label>
        <input id="name" type="text" placeholder="请输入真实姓名"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">手机号</label>
        <input id="phone" type="tel" placeholder="请输入手机号"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
        <input id="password" type="password" placeholder="至少8位，包含字母和数字"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 transition">
      </div>
      <button onclick="doRegister()"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-xl transition text-sm">
        注册并登录
      </button>
    </div>
  </div>
</div>

<script>
async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');

  if (!name || !phone || !password) {
    errEl.textContent = '请填写所有必填项';
    errEl.classList.remove('hidden');
    return;
  }

  const resp = await fetch('/tools/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, phone, password}),
  });
  const data = await resp.json();

  if (data.success) {
    // 自动登录
    const loginResp = await fetch('/tools/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone, password}),
    });
    const loginData = await loginResp.json();
    if (loginData.success) {
      window.location.href = '/consent';
    } else {
      window.location.href = '/login';
    }
  } else {
    errEl.textContent = data.error.message;
    errEl.classList.remove('hidden');
  }
}
</script>
</body>
</html>
