<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 治未病平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg:             #F5F2EC;
      --surface:        #FFFFFF;
      --surface-warm:   #FDFCF9;
      --primary:        #4E7A61;
      --primary-hover:  #3F6A52;
      --primary-light:  #EBF2ED;
      --text:           #28231E;
      --text-secondary: #6A6258;
      --text-muted:     #9A9188;
      --border:         #E4DDD4;
      --error:          #D95C4A;
      --error-bg:       #FEF2F0;
      --error-border:   #FECDCA;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    .input-field {
      border: 1.5px solid var(--border);
      border-radius: 13px;
      padding: 13px 16px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
      background: var(--surface-warm);
      color: var(--text);
      font-family: inherit;
    }
    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(78, 122, 97, 0.12);
    }
    .input-field::placeholder { color: var(--text-muted); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
      width: 100%;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .anim-2 { animation: fadeUp 0.5s 0.08s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @media (prefers-reduced-motion: reduce) {
      .anim-1, .anim-2 { animation: none; }
    }
  </style>
</head>
<body>

<!-- 背景光晕 -->
<div aria-hidden="true" style="position: fixed; inset: 0; overflow: hidden; pointer-events: none;">
  <div style="position: absolute; top: -80px; left: -60px; width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(78,122,97,0.09) 0%, transparent 70%);"></div>
  <div style="position: absolute; bottom: -60px; right: -80px; width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, rgba(184,136,94,0.07) 0%, transparent 70%);"></div>
</div>

<div style="position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px;">

  <!-- 顶部导航 -->
  <div style="width: 100%; max-width: 420px; margin-bottom: 20px;" class="anim-1">
    <a href="/login" style="
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--primary); font-size: 14px; font-weight: 500; text-decoration: none;
      padding: 8px 0; cursor: pointer;
    ">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      返回登录
    </a>
  </div>

  <!-- 标题 -->
  <div style="width: 100%; max-width: 420px; margin-bottom: 24px;" class="anim-1">
    <h1 style="font-size: 24px; font-weight: 700; color: var(--text); margin: 0; letter-spacing: -0.01em;">创建账号</h1>
    <p style="font-size: 14px; color: var(--text-muted); margin: 8px 0 0;">加入治未病健康管理平台</p>
  </div>

  <!-- 注册卡片 -->
  <div style="
    background: var(--surface);
    border-radius: 24px;
    box-shadow: 0 4px 36px rgba(68,60,48,0.11);
    padding: 28px 24px 24px;
    width: 100%;
    max-width: 420px;
  " class="anim-2">

    <div id="error-msg" style="
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.5;
    "></div>

    <div style="display: flex; flex-direction: column; gap: 16px;">
      <div>
        <label style="display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 7px;">姓名</label>
        <input id="name" type="text" placeholder="请输入真实姓名" class="input-field" autocomplete="name">
      </div>
      <div>
        <label style="display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 7px;">手机号</label>
        <input id="phone" type="tel" placeholder="请输入手机号" class="input-field" autocomplete="tel">
      </div>
      <div>
        <label style="display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 7px;">密码</label>
        <input id="password" type="password" placeholder="至少8位，包含字母和数字" class="input-field" autocomplete="new-password">
      </div>
      <button id="reg-btn" onclick="doRegister()" class="btn-primary" style="margin-top: 4px;">
        注册并登录
      </button>
    </div>

    <div style="text-align: center; margin-top: 20px;">
      <span style="color: var(--text-muted); font-size: 14px;">已有账号？</span>
      <a href="/login" style="color: var(--primary); font-size: 14px; font-weight: 500; margin-left: 4px; text-decoration: none;">立即登录</a>
    </div>
  </div>

</div>

<script>
async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('reg-btn');

  if (!name || !phone || !password) {
    errEl.textContent = '请填写所有必填项';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '注册中…';
  errEl.style.display = 'none';

  try {
    const resp = await fetch('/tools/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, phone, password}),
    });
    const data = await resp.json();

    if (data.success) {
      const loginResp = await fetch('/tools/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({phone, password}),
      });
      const loginData = await loginResp.json();
      window.location.href = loginData.success ? '/consent' : '/login';
    } else {
      errEl.textContent = data.error.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '注册并登录';
    }
  } catch (e) {
    errEl.textContent = '网络错误，请稍后重试';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '注册并登录';
  }
}
</script>
</body>
</html>
