<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}治未病管理平台{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .sidebar-link { transition: background-color 0.15s; }
    .sidebar-link:hover { background-color: rgba(22,163,74,0.1); }
    .sidebar-link.active { background-color: rgba(22,163,74,0.15); color: #16a34a; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">

<div class="flex min-h-screen">
  <!-- 侧边栏 -->
  <aside class="w-56 bg-white shadow-sm flex flex-col">
    <div class="px-6 py-5 border-b border-gray-100">
      <h1 class="text-green-700 font-bold text-lg">🌿 治未病平台</h1>
      <p class="text-gray-400 text-xs mt-0.5">管理控制台</p>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/gui/admin/alerts" class="sidebar-link {% if active_nav == 'alerts' %}active{% endif %} flex items-center px-3 py-2.5 rounded-lg text-sm text-gray-700">
        <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        预警处置
      </a>
      <a href="/gui/admin/content" class="sidebar-link {% if active_nav == 'content' %}active{% endif %} flex items-center px-3 py-2.5 rounded-lg text-sm text-gray-700">
        <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        内容管理
      </a>
      <a href="/gui/admin/audit" class="sidebar-link {% if active_nav == 'audit' %}active{% endif %} flex items-center px-3 py-2.5 rounded-lg text-sm text-gray-700">
        <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        审计日志
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-gray-100">
      <button onclick="logout()" class="w-full flex items-center px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-50">
        <svg class="w-4 h-4 mr-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        退出登录
      </button>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="flex-1 flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-200 px-6 py-4">
      <h2 class="text-gray-800 font-semibold text-lg">{% block page_title %}{% endblock %}</h2>
    </header>
    <div class="flex-1 p-6">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<script>
async function logout() {
  const r = await fetch('/tools/auth/logout', {method: 'POST'});
  if (r.ok) window.location.href = '/login';
}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
