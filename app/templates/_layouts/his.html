<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HIS 门诊工作站{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f3f4f6; overflow: hidden; }
    .his-header { background: linear-gradient(90deg, #1a2744 0%, #263561 100%); color: #fff; height: 56px; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .his-nav-btn { padding: 5px 12px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); font-size: 12px; cursor: pointer; white-space: nowrap; transition: background 0.15s; font-family: inherit; }
    .his-nav-btn:hover { background: rgba(255,255,255,0.16); }
    .his-nav-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }
    .his-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
  </style>
</head>
<body style="display:flex; flex-direction:column; height:100vh;">

  <!-- 顶部导航 -->
  <header class="his-header">
    <!-- Logo -->
    <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M12 8v8M8 12h8"/>
      </svg>
      <span style="font-size:14px; font-weight:700; color:#fff; white-space:nowrap;">Fusion AI生成式HIS</span>
    </div>

    <div class="his-divider"></div>

    <!-- 模块导航 -->
    <nav style="display:flex; gap:4px; flex-shrink:0;">
      <button class="his-nav-btn active">门诊</button>
      <button class="his-nav-btn">住院</button>
      <button class="his-nav-btn">急诊</button>
      <button class="his-nav-btn">检查</button>
      <button class="his-nav-btn">检验</button>
      <button class="his-nav-btn">药房</button>
    </nav>

    <div class="his-divider"></div>

    <!-- 医生信息 -->
    <div style="display:flex; align-items:center; gap:6px; font-size:12px; flex-shrink:0;">
      <svg width="13" height="13" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span style="color:rgba(255,255,255,0.85);">{{ user_ctx.name or '医生' }}</span>
      <span style="color:rgba(255,255,255,0.4);">·</span>
      <span style="color:rgba(255,255,255,0.6);">中医科</span>
    </div>

    <div style="flex:1;"></div>

    <!-- 右侧工具 -->
    <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
      <button class="his-nav-btn">消息</button>
      <button class="his-nav-btn">帮助</button>
      <div class="his-divider"></div>
      <a href="/tools/auth/logout" class="his-nav-btn" style="text-decoration:none; color:rgba(255,255,255,0.85);">退出</a>
    </div>
  </header>

  <!-- 主内容 -->
  <main style="flex:1; overflow:hidden;">
    {% block content %}{% endblock %}
  </main>

  <script>
    function showToast(msg, type) {
      const t = document.createElement('div');
      const bg = type === 'error' ? '#dc2626' : type === 'success' ? '#16a34a' : '#1e2d5a';
      t.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);background:${bg};color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.15);`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
