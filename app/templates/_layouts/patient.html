<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{% block title %}治未病平台{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }
    .nav-tab.active { color: #16a34a; }
    .nav-tab.active svg { stroke: #16a34a; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 顶部标题栏 -->
  <header class="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
    {% block header_left %}
    <div class="w-8"></div>
    {% endblock %}
    <h1 class="text-base font-semibold text-gray-800">{% block page_title %}治未病平台{% endblock %}</h1>
    {% block header_right %}
    <div class="w-8"></div>
    {% endblock %}
  </header>

  <!-- 主内容区 -->
  <main class="pb-20 min-h-screen">
    {% block content %}{% endblock %}
  </main>

  <!-- 底部导航栏 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 safe-bottom z-10">
    <div class="flex justify-around">
      <a href="/h5/home" class="nav-tab flex flex-col items-center py-2 px-4 text-gray-500 {% if active_tab == 'home' %}active{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs mt-0.5">首页</span>
      </a>
      <a href="/h5/indicators" class="nav-tab flex flex-col items-center py-2 px-4 text-gray-500 {% if active_tab == 'indicators' %}active{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="text-xs mt-0.5">指标</span>
      </a>
      <a href="/h5/constitution" class="nav-tab flex flex-col items-center py-2 px-4 text-gray-500 {% if active_tab == 'constitution' %}active{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        <span class="text-xs mt-0.5">体质</span>
      </a>
      <a href="/h5/content" class="nav-tab flex flex-col items-center py-2 px-4 text-gray-500 {% if active_tab == 'content' %}active{% endif %}">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <span class="text-xs mt-0.5">知识</span>
      </a>
    </div>
  </nav>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
