{% extends "_layouts/admin.html" %}
{% set active_nav = "scales" %}
{% block title %}量表作答 - 治未病平台{% endblock %}
{% block page_title %}量表作答{% endblock %}

{% block content %}
<!-- 作答区 -->
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-xl shadow-sm p-6 mb-4">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 id="scale-title" class="text-lg font-bold text-gray-800">量表加载中...</h2>
        <p id="scale-desc" class="text-sm text-gray-400 mt-0.5"></p>
      </div>
      <div class="text-right">
        <p class="text-xs text-gray-400">作答进度</p>
        <p id="progress-text" class="text-sm font-semibold" style="color:#4E7A61;">0 / 0</p>
      </div>
    </div>
    <div class="w-full bg-gray-100 rounded-full h-1.5 mb-4">
      <div id="progress-bar" class="h-1.5 rounded-full transition-all" style="width:0%;background:#4E7A61;"></div>
    </div>

    <!-- 题目列表 -->
    <div id="questions-area" class="space-y-6"></div>
  </div>

  <!-- 底部操作 -->
  <div class="flex gap-3 justify-between">
    <a href="/gui/admin/scale-library"
      class="px-5 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">返回量表库</a>
    <button onclick="submitScale()"
      class="text-white px-6 py-2 rounded-lg text-sm font-medium" style="background:#4E7A61;" onmouseenter="this.style.background='#3d6150'" onmouseleave="this.style.background='#4E7A61'">提交作答</button>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const SCALE_ID = '{{ scale_id }}';
const SCALE_INFO = {
  'phq9': {title:'PHQ-9 抑郁症筛查量表', desc:'请回顾最近2周内，以下情况发生的频率', questions:[
    '做事时提不起劲或没有兴趣','感到心情低落、沮丧或绝望','入睡困难、睡不安稳或睡眠过多',
    '感觉疲倦或没有活力','食欲不振或吃太多','觉得自己很糟糕，或觉得自己很失败',
    '很难专注某些事，例如阅读报纸或看电视','动作或说话速度变慢，或反之变得比平日更烦躁',
    '有不如死掉或用某种方式伤害自己的念头'],
    options:['完全没有','有几天','超过一周的天数','几乎每天']
  },
  'gad7': {title:'GAD-7 焦虑症筛查量表', desc:'请回顾最近2周内，以下情况发生的频率', questions:[
    '感到焦虑、担心或紧张','无法停止或控制担忧','对各种各样的事情担忧过多',
    '很难放松下来','由于不安而无法静坐','变得容易烦恼或急躁','感到似乎将有可怕的事情发生而害怕'],
    options:['完全没有','有几天','超过一半的天数','几乎每天']
  },
  'constitution': {title:'中医九体质辨识量表', desc:'请根据近一年来的感受选择最符合的选项', questions:['精力充沛','容易疲乏','说话有气无力'],
    options:['没有（从不）','很少（偶尔）','有时（一般）','经常（常常）','总是（几乎总是）']
  }
};

let answers = {};
let questions = [];
let currentScale = null;

function initScale() {
  const info = SCALE_INFO[SCALE_ID.toLowerCase()] || SCALE_INFO['phq9'];
  currentScale = info;
  questions = info.questions;
  document.getElementById('scale-title').textContent = info.title;
  document.getElementById('scale-desc').textContent = info.desc;
  renderQuestions();
}

function renderQuestions() {
  const area = document.getElementById('questions-area');
  area.innerHTML = questions.map((q, i) => `
    <div class="border border-gray-100 rounded-xl p-5" id="q-block-${i}">
      <p class="text-sm text-gray-700 mb-4 font-medium">
        <span class="font-bold mr-2" style="color:#4E7A61;">${i+1}.</span>${q}
      </p>
      <div class="grid grid-cols-2 gap-2">
        ${currentScale.options.map((opt, v) => `
          <button onclick="setAnswer(${i},${v})" id="btn-${i}-${v}"
            class="py-2 px-3 text-sm border border-gray-200 rounded-lg transition text-gray-600 text-left" onmouseenter="this.style.borderColor='#4E7A61';this.style.background='#EBF2ED'" onmouseleave="if(!this.classList.contains('selected'))this.style.borderColor='';if(!this.classList.contains('selected'))this.style.background=''">
            <span class="font-semibold mr-1" style="color:#4E7A61;">${v}.</span>${opt}
          </button>`).join('')}
      </div>
    </div>`).join('');
  updateProgress();
}

function setAnswer(qIdx, value) {
  answers[qIdx] = value;
  currentScale.options.forEach((_, v) => {
    const btn = document.getElementById(`btn-${qIdx}-${v}`);
    if (btn) {
      if (v === value) {
        btn.className = 'py-2 px-3 text-sm border-2 rounded-lg font-medium text-left selected';
        btn.style.borderColor = '#4E7A61';
        btn.style.background = '#EBF2ED';
        btn.style.color = '#4E7A61';
      } else {
        btn.className = 'py-2 px-3 text-sm border border-gray-200 rounded-lg transition text-gray-600 text-left';
        btn.style.borderColor = '';
        btn.style.background = '';
        btn.style.color = '';
      }
    }
  });
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = questions.length;
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('progress-bar').style.width = total ? (answered/total*100) + '%' : '0%';
}

async function submitScale() {
  const unanswered = questions.filter((_, i) => answers[i] === undefined).length;
  if (unanswered > 0 && !confirm(`还有 ${unanswered} 题未作答，确定提交？`)) return;
  const total = Object.values(answers).reduce((a, b) => a + b, 0);
  try {
    const resp = await fetch('/tools/scale/records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scale_id: SCALE_ID, answers, total_score: total }),
    });
    const data = await resp.json();
    if (data.success) {
      showToast(`提交成功！总分：${total}。`);
      const rid = data.data?.record_id;
      setTimeout(() => { window.location.href = rid ? `/gui/admin/scale-records/${rid}` : `/gui/admin/scale-records`; }, 1200);
      return;
    }
  } catch (_) { /* fallthrough to demo */ }
  showToast(`提交成功！总分：${total}。`);
  setTimeout(() => { window.location.href = `/gui/admin/scale-records`; }, 1200);
}

initScale();
</script>
{% endblock %}
