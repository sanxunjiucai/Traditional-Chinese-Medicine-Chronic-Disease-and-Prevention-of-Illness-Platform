{% extends "_layouts/admin.html" %}
{% set active_nav = "assessments" %}
{% block title %}新增健康评估 - 治未病平台{% endblock %}
{% block page_title %}新增健康评估{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-xl shadow-sm p-6 mb-4">
    <h3 class="font-semibold text-gray-700 mb-4">选择受测患者</h3>
    <div class="flex gap-3 mb-4">
      <input id="search-input" type="text" placeholder="点击或输入姓名/手机号搜索患者档案"
        onfocus="searchPatient()" oninput="debounceSearch()" autocomplete="off"
        class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-300">
      <button onclick="searchPatient()"
        class="bg-teal-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-teal-700">搜索</button>
    </div>
    <div id="search-results" class="hidden">
      <div id="results-list" class="space-y-2 max-h-60 overflow-y-auto"></div>
    </div>
    <div id="selected-patient" class="hidden bg-teal-50 border border-teal-200 rounded-lg p-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-teal-200 flex items-center justify-center font-bold text-teal-600" id="sel-avatar">-</div>
        <div class="flex-1">
          <p id="sel-name" class="font-semibold text-gray-800"></p>
          <p id="sel-info" class="text-sm text-gray-500"></p>
        </div>
        <button onclick="clearSelection()" class="text-gray-400 hover:text-gray-600 text-sm">✕</button>
      </div>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-6 mb-4">
    <h3 class="font-semibold text-gray-700 mb-4">评估配置</h3>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-gray-600 mb-1">评估量表</label>
        <select id="scale-type"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-300">
          <option value="PHQ9">PHQ-9 抑郁症筛查</option>
          <option value="GAD7">GAD-7 焦虑症筛查</option>
          <option value="SF36">SF-36 生活质量</option>
          <option value="MMSE">MMSE 认知评估</option>
          <option value="ADL">ADL 日常生活能力</option>
          <option value="FRAILTY">衰弱评估量表</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">评估方式</label>
        <select id="assess-mode"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-300">
          <option value="SELF">自助作答</option>
          <option value="ASSISTED">医生辅助</option>
        </select>
      </div>
      <div class="col-span-2">
        <label class="block text-sm text-gray-600 mb-1">评估背景</label>
        <textarea id="assess-notes" rows="2" placeholder="评估背景说明、主诉等..."
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-300"></textarea>
      </div>
    </div>
  </div>

  <div class="flex gap-3 justify-end">
    <a href="/gui/admin/health-assess"
      class="px-5 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">取消</a>
    <button onclick="createAssess()"
      class="bg-teal-600 text-white px-5 py-2 rounded-lg text-sm hover:bg-teal-700 font-medium">创建评估</button>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let selectedArchiveId = null;
let _allPatients = null;
let _searchTimer = null;

async function loadAllPatients() {
  if (_allPatients !== null) return _allPatients;
  try {
    const res = await fetch('/tools/archive/archives?page_size=100');
    const data = await res.json();
    _allPatients = (data.success && data.data?.items) ? data.data.items : [];
  } catch { _allPatients = []; }
  return _allPatients;
}

async function searchPatient() {
  const q = document.getElementById('search-input').value.trim();
  const patients = await loadAllPatients();
  const filtered = q
    ? patients.filter(p => p.name.includes(q) || (p.phone||'').includes(q))
    : patients;
  const list = document.getElementById('results-list');
  document.getElementById('search-results').classList.remove('hidden');
  if (!filtered.length) {
    list.innerHTML = '<p class="text-sm text-gray-400 py-2 text-center">未找到匹配档案</p>'; return;
  }
  list.innerHTML = filtered.slice(0, 30).map(p => `
    <div class="flex items-center gap-3 p-3 border border-gray-100 rounded-lg cursor-pointer hover:border-teal-300 hover:bg-teal-50"
      onclick="selectPatient('${p.id}','${p.name}','${p.gender||''}','${p.phone||''}')">
      <div class="w-8 h-8 rounded-full bg-teal-100 flex items-center justify-center text-teal-600 font-bold text-sm">${p.name[0]}</div>
      <div class="flex-1"><p class="text-sm font-medium">${p.name}</p><p class="text-xs text-gray-400">${p.phone||'无手机号'}</p></div>
    </div>`).join('');
}

function debounceSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(searchPatient, 200);
}

function selectPatient(id, name, gender, phone) {
  selectedArchiveId = id;
  document.getElementById('search-results').classList.add('hidden');
  document.getElementById('selected-patient').classList.remove('hidden');
  document.getElementById('sel-avatar').textContent = name[0];
  document.getElementById('sel-name').textContent = name;
  document.getElementById('sel-info').textContent = `${gender==='male'?'男':'女'} · ${phone||'无手机号'}`;
}

function clearSelection() {
  selectedArchiveId = null;
  document.getElementById('selected-patient').classList.add('hidden');
  document.getElementById('search-input').value = '';
}

document.addEventListener('click', e => {
  if (!e.target.closest('#search-input') && !e.target.closest('#search-results')) {
    document.getElementById('search-results').classList.add('hidden');
  }
});

async function createAssess() {
  if (!selectedArchiveId) { showToast('请先选择患者档案'); return; }
  showToast('健康评估功能开发中，敬请期待');
}
</script>
{% endblock %}
