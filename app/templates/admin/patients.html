{% extends "_layouts/admin.html" %}
{% set active_nav = "patients" %}
{% block title %}患者管理 - 治未病平台{% endblock %}
{% block page_title %}患者管理{% endblock %}

{% block content %}
<!-- 搜索栏 -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex flex-wrap gap-3 items-center">
  <input id="q" type="text" placeholder="姓名 / 手机号搜索"
    class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-56 focus:outline-none focus:ring-2 focus:ring-jade-light">
  <select id="is_active" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-jade-light">
    <option value="">全部状态</option>
    <option value="true">启用</option>
    <option value="false">禁用</option>
  </select>
  <button onclick="loadPatients(1)" class="text-white px-4 py-2 rounded-lg text-sm" style="background:#4E7A61;" onmouseover="this.style.background='#3F6A52'" onmouseout="this.style.background='#4E7A61'">搜索</button>
  <span class="text-gray-400 text-sm ml-auto">共 <span id="total">-</span> 名患者</span>
</div>

<!-- 表格 -->
<div class="bg-white rounded-xl shadow-sm overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
      <tr>
        <th class="px-5 py-3 text-left">姓名</th>
        <th class="px-5 py-3 text-left">手机号</th>
        <th class="px-5 py-3 text-left">注册时间</th>
        <th class="px-5 py-3 text-left">状态</th>
        <th class="px-5 py-3 text-left">操作</th>
      </tr>
    </thead>
    <tbody id="patient-list" class="divide-y divide-gray-100">
      <tr><td colspan="5" class="px-5 py-8 text-center text-gray-400">加载中...</td></tr>
    </tbody>
  </table>
</div>

<!-- 分页 -->
<div id="pagination" class="flex justify-center gap-2 mt-4 hidden"></div>

<!-- 结果消息 -->
<div id="msg" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-full text-sm shadow-lg"></div>
{% endblock %}

{% block extra_scripts %}
<script>
let currentPage = 1;

async function loadPatients(page = 1) {
  currentPage = page;
  const q = document.getElementById('q').value.trim();
  const is_active = document.getElementById('is_active').value;
  const params = new URLSearchParams({ page, page_size: 20 });
  if (q) params.set('q', q);
  if (is_active) params.set('is_active', is_active);

  const resp = await fetch('/tools/admin/patients?' + params.toString());
  const json = await resp.json();
  if (!json.success) { showMsg('加载失败'); return; }
  const { total, items } = json.data;

  document.getElementById('total').textContent = total;

  const tbody = document.getElementById('patient-list');
  if (items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="px-5 py-8 text-center text-gray-400">暂无数据</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(u => `
    <tr class="hover:bg-gray-50">
      <td class="px-5 py-3 font-medium text-gray-800">${u.name}</td>
      <td class="px-5 py-3 text-gray-600">${u.phone}</td>
      <td class="px-5 py-3 text-gray-500">${u.created_at.slice(0,10)}</td>
      <td class="px-5 py-3">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${u.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
          ${u.is_active ? '启用' : '禁用'}
        </span>
      </td>
      <td class="px-5 py-3">
        <button onclick="toggleActive('${u.id}', ${u.is_active})"
          class="text-sm ${u.is_active ? 'text-red-500 hover:text-red-700' : 'text-green-600 hover:text-green-800'}">
          ${u.is_active ? '禁用' : '启用'}
        </button>
      </td>
    </tr>
  `).join('');

  // 分页
  const totalPages = Math.ceil(total / 20);
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.classList.add('hidden'); return; }
  pg.classList.remove('hidden');
  pg.innerHTML = Array.from({length: totalPages}, (_, i) => i + 1).map(p => `
    <button onclick="loadPatients(${p})"
      class="px-3 py-1.5 rounded-lg text-sm ${p === currentPage ? 'text-jade bg-jade-light' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}">
      ${p}
    </button>
  `).join('');
}

async function toggleActive(id, currentActive) {
  if (!confirm(`确定要${currentActive ? '禁用' : '启用'}该患者吗？`)) return;
  const resp = await fetch(`/tools/admin/patients/${id}/toggle-active`, { method: 'PATCH' });
  const json = await resp.json();
  if (json.success) {
    showMsg(currentActive ? '已禁用' : '已启用');
    loadPatients(currentPage);
  } else {
    showMsg('操作失败：' + (json.error?.message || '未知错误'));
  }
}

function showMsg(text, duration = 2500) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), duration);
}

document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') loadPatients(1); });
loadPatients(1);
</script>
{% endblock %}
