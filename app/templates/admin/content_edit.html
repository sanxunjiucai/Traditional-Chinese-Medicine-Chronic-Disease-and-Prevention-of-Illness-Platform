{% extends "_layouts/admin.html" %}
{% block title %}{% if content_id %}编辑文章{% else %}新建文章{% endif %}{% endblock %}
{% block page_title %}{% if content_id %}编辑文章{% else %}新建文章{% endif %}{% endblock %}

{% block content %}
<div class="max-w-3xl space-y-5">

  <!-- 返回 -->
  <a href="/gui/admin/content" class="inline-flex items-center text-sm text-gray-500 hover:text-green-600">
    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    返回列表
  </a>

  <div class="bg-white rounded-xl shadow-sm p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">标题 <span class="text-red-500">*</span></label>
      <input id="title" type="text" placeholder="请输入文章标题"
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">标签（逗号分隔）</label>
      <input id="tags" type="text" placeholder="例如：高血压,饮食,运动"
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">正文 <span class="text-red-500">*</span></label>
      <textarea id="body" rows="16" placeholder="请输入文章正文内容..."
        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 resize-y font-mono leading-relaxed"></textarea>
    </div>

    <div id="error-msg" class="hidden bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700"></div>
    <div id="success-msg" class="hidden bg-green-50 border border-green-200 rounded-lg px-4 py-3 text-sm text-green-700"></div>

    <div class="flex justify-end space-x-3 pt-2">
      <a href="/gui/admin/content"
        class="border border-gray-200 text-gray-600 px-5 py-2.5 rounded-lg text-sm">取消</a>
      <button onclick="save()"
        class="bg-green-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-green-700">
        保存草稿
      </button>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
const CONTENT_ID = "{{ content_id or '' }}";

async function init() {
  if (!CONTENT_ID) return;
  const resp = await fetch(`/tools/content/${CONTENT_ID}`);
  const data = await resp.json();
  if (!data.success) { showError('加载失败：' + data.error.message); return; }
  const c = data.data;
  document.getElementById('title').value = c.title || '';
  document.getElementById('tags').value = (c.tags || []).join(', ');
  document.getElementById('body').value = c.body || '';
}

async function save() {
  const title = document.getElementById('title').value.trim();
  const body = document.getElementById('body').value.trim();
  const tagsRaw = document.getElementById('tags').value.trim();
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  if (!title) { showError('请填写标题'); return; }
  if (!body) { showError('请填写正文'); return; }

  const payload = {title, body, tags};
  let resp;
  if (CONTENT_ID) {
    resp = await fetch(`/tools/content/${CONTENT_ID}`, {
      method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload),
    });
  } else {
    resp = await fetch('/tools/content', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload),
    });
  }

  const data = await resp.json();
  if (data.success) {
    showSuccess('保存成功！');
    if (!CONTENT_ID && data.data?.id) {
      setTimeout(() => { window.location.href = `/gui/admin/content/${data.data.id}/edit`; }, 800);
    }
  } else {
    showError(data.error.message);
  }
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-msg').classList.remove('hidden');
  document.getElementById('success-msg').classList.add('hidden');
}
function showSuccess(msg) {
  document.getElementById('success-msg').textContent = msg;
  document.getElementById('success-msg').classList.remove('hidden');
  document.getElementById('error-msg').classList.add('hidden');
}

init();
</script>
{% endblock %}
