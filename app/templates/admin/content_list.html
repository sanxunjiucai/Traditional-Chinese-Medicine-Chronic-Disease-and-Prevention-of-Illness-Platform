{% extends "_layouts/admin.html" %}
{% block title %}内容管理{% endblock %}
{% block page_title %}内容管理{% endblock %}

{% block content %}
<!-- 操作栏 -->
<div class="flex items-center gap-3 mb-5">
  <select id="filter-status" onchange="load()"
    class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-jade-light bg-white">
    <option value="">全部状态</option>
    <option value="DRAFT">草稿</option>
    <option value="PENDING_REVIEW">待审核</option>
    <option value="PUBLISHED">已发布</option>
    <option value="OFFLINE">已下线</option>
  </select>
  <button onclick="load()" class="border border-gray-200 bg-white text-gray-600 px-4 py-2 rounded-lg text-sm">刷新</button>
  <a href="/gui/admin/content/new"
    class="ml-auto bg-green-600 text-white px-4 py-2 rounded-lg text-sm flex items-center space-x-1.5">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
    </svg>
    <span>新建文章</span>
  </a>
</div>

<!-- 文章列表 -->
<div class="bg-white rounded-xl shadow-sm overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-gray-50 border-b border-gray-200">
      <tr>
        <th class="text-left px-4 py-3 text-gray-600 font-medium">标题</th>
        <th class="text-left px-4 py-3 text-gray-600 font-medium">标签</th>
        <th class="text-left px-4 py-3 text-gray-600 font-medium">状态</th>
        <th class="text-left px-4 py-3 text-gray-600 font-medium">创建时间</th>
        <th class="text-left px-4 py-3 text-gray-600 font-medium">操作</th>
      </tr>
    </thead>
    <tbody id="content-tbody">
      <tr><td colspan="5" class="text-center py-10 text-gray-400">加载中...</td></tr>
    </tbody>
  </table>
</div>

<!-- 操作结果提示 -->
<p id="op-msg" class="hidden text-sm text-center mt-3"></p>
{% endblock %}

{% block extra_scripts %}
<script>
const STATUS_BADGE = {
  DRAFT: 'bg-gray-100 text-gray-500',
  PENDING_REVIEW: 'bg-yellow-100 text-yellow-700',
  PUBLISHED: 'bg-green-100 text-green-700',
  OFFLINE: 'bg-red-50 text-red-400',
};
const STATUS_LABELS = {
  DRAFT: '草稿', PENDING_REVIEW: '待审核', PUBLISHED: '已发布', OFFLINE: '已下线',
};

async function load() {
  const status = document.getElementById('filter-status').value;
  const params = status ? `?status=${status}` : '';
  const resp = await fetch('/tools/content/admin' + params);
  const data = await resp.json();
  const tbody = document.getElementById('content-tbody');
  if (!data.success || data.data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-gray-400">暂无文章</td></tr>';
    return;
  }

  tbody.innerHTML = data.data.map(c => {
    const tags = (c.tags || []).map(t => `<span class="bg-gray-100 text-gray-500 text-xs px-1.5 py-0.5 rounded">${t}</span>`).join(' ');
    const actions = buildActions(c);
    return `
    <tr class="border-b border-gray-100 hover:bg-gray-50">
      <td class="px-4 py-3 text-gray-800 font-medium max-w-xs">
        <div class="truncate">${c.title}</div>
      </td>
      <td class="px-4 py-3">${tags || '<span class="text-gray-300">-</span>'}</td>
      <td class="px-4 py-3">
        <span class="px-2 py-0.5 rounded-full text-xs font-medium ${STATUS_BADGE[c.status] || ''}">
          ${STATUS_LABELS[c.status] || c.status}
        </span>
      </td>
      <td class="px-4 py-3 text-gray-400 text-xs">${c.created_at ? c.created_at.slice(0,10) : '-'}</td>
      <td class="px-4 py-3 space-x-2">${actions}</td>
    </tr>`;
  }).join('');
}

function buildActions(c) {
  let html = `<a href="/gui/admin/content/${c.id}/edit" class="hover:underline" style="color:#4E7A61;">编辑</a>`;
  if (c.status === 'DRAFT') {
    html += ` <button onclick="submitReview('${c.id}')" class="text-yellow-600 hover:underline">提交审核</button>`;
  } else if (c.status === 'PENDING_REVIEW') {
    html += ` <button onclick="publish('${c.id}')" class="text-green-600 hover:underline">发布</button>`;
  } else if (c.status === 'PUBLISHED') {
    html += ` <button onclick="offline('${c.id}')" class="text-red-400 hover:underline">下线</button>`;
  }
  return html;
}

async function submitReview(id) {
  const r = await fetch(`/tools/content/${id}/submit-review`, {method: 'PATCH'});
  const d = await r.json();
  if (d.success) { showMsg('已提交审核', 'green'); load(); }
  else showMsg(d.error.message, 'red');
}

async function publish(id) {
  const r = await fetch(`/tools/content/${id}/publish`, {method: 'PATCH'});
  const d = await r.json();
  if (d.success) { showMsg('已发布', 'green'); load(); }
  else showMsg(d.error.message, 'red');
}

async function offline(id) {
  if (!confirm('确认下线该文章？')) return;
  const r = await fetch(`/tools/content/${id}/offline`, {method: 'PATCH'});
  const d = await r.json();
  if (d.success) { showMsg('已下线', 'green'); load(); }
  else showMsg(d.error.message, 'red');
}

function showMsg(msg, color) {
  const el = document.getElementById('op-msg');
  el.textContent = msg;
  el.className = `text-sm text-center mt-3 ${color === 'green' ? 'text-green-600' : 'text-red-600'}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

load();
</script>
{% endblock %}
